<!DOCTYPE html>
<html lang="de">
	<head>
		<title>Embedded Innovation Clock</title>
		<style media="screen" type="text/css">
			html {
			}
			body {
				font-family: sans-serif;
				font-size: 300px;
				color: #111;
			}

			.container {
				position: absolute;               /* 2 */
   			top: 50%;                         /* 3 */
   			transform: translate(0, -50%);   /* 4 */
   			width: 99%;
				text-align: center;
				border: 0px solid #000;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div id="time"></div>
		</div>

		<script type="text/javascript">
			(function () {
    		function checkTime(i) {
        	return (i < 10) ? "0" + i : i;
    		}

    		function startTime() {
        	var today = new Date(),
            h = checkTime(today.getHours()),
            m = checkTime(today.getMinutes()),
            s = checkTime(today.getSeconds());

        	document.getElementById('time').innerHTML = h + ":" + m + ":" + s;
        	t = setTimeout(function () {
          	startTime()
        	}, 500);
    		}
    	startTime();
		})();
		</script>
	</body>
</html>
